<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOMBAY SPECIAL VIP</title>
    <style>
        :root { --gold: #ffcc00; --bg: #f4f4f4; --grid-border: #999; }
        body { background: var(--bg); color: #000; font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 0; }
        .header { background: #111; color: #fff; padding: 15px; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        
        .intro-text { 
            background: #fff9c4; 
            padding: 15px; 
            margin: 10px auto; 
            width: 90%; 
            max-width: 800px; 
            border-radius: 8px; 
            border: 1px solid #fbc02d; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            font-size: 13px;
            line-height: 1.4;
            color: #222;
            text-align: justify;
        }
        .intro-text p { margin: 0; padding: 0; }

        .nav-btn { background: #333; color: #fff; padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; margin: 10px; font-weight: bold; font-size: 12px; }

        /* =========================================
           मोबाइल फिट चार्ट स्टाइल
           ========================================= */
        #chartArea { 
            background: #fff; 
            width: 95%; /* दोनों साइड स्पेस के लिए */
            margin: 10px auto; 
            border-radius: 4px; 
            overflow: hidden; /* स्क्रॉल हटाकर फिट करने की कोशिश */
            box-shadow: 0 0 10px rgba(0,0,0,0.1); 
            border: 1px solid var(--grid-border);
        }

        .chart-grid {
            display: grid;
            grid-template-columns: 50px repeat(6, 1fr); /* डेट कॉलम थोड़ा छोटा किया */
            width: 100%;
        }

        .day-label, .date-label, .date-box, .cell, .lock {
            border-right: 1px solid var(--grid-border);
            border-bottom: 1px solid var(--grid-border);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* हेडर को ब्लैक किया गया है */
        .day-label, .date-label {
            background: #000 !important; /* शुद्ध काला रंग */
            color: var(--gold) !important; /* लिखावट गोल्ड ताकि साफ़ दिखे */
            font-weight: bold;
            font-size: 10px;
            padding: 10px 0;
        }

        .date-box { 
            background: #f9f9f9; 
            color: #000; 
            font-size: 9px; 
            font-weight: bold; 
            padding: 2px;
        }

        .cell { 
            padding: 0;
            position: relative;
            aspect-ratio: 1 / 1.1; /* मोबाइल पर फिट आने के लिए थोड़ा एडजस्ट किया */
            background: #fff;
        }

        .panna { 
            display: flex; 
            flex-direction: column; 
            font-size: 8px; /* पन्ना थोड़ा छोटा किया */
            color: #555; 
            font-weight: bold; 
            line-height: 1; 
            position: absolute;
        }
        .panna.left { left: 1px; }
        .panna.right { right: 1px; }

        .jodi { 
            font-size: 18px; /* जोड़ी का साइज मोबाइल के हिसाब से सेट किया */
            font-weight: bold; 
            color: #000;
            z-index: 1;
        }

        .lock { background: #fdfdfd; color: #ccc; font-size: 14px; }
        .red { color: #e31e24 !important; }

        .card { background: #fff; border: 1px solid #ddd; margin: 20px auto; padding: 20px; border-radius: 12px; width: 85%; max-width: 400px; }
        .btn { padding: 15px; background: #111; color: #fff; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; margin-top: 10px; }
        .footer-spacer { padding-bottom: 60px; }
    </style>
</head>
<body>

<div class="header">
    <h1>BOMBAY SPECIAL VIP</h1>
</div>

<div class="intro-text">
    <p>People get more from Game with a <b>BOMBAY SPECIAL VIP CHART</b>...</p>
</div>

<button class="nav-btn" onclick="document.getElementById('bottom').scrollIntoView({behavior: 'smooth'})">Go to Bottom ↓</button>

<div id="chartArea">
    <div class="chart-grid"> 
        <div class="date-label">DATE</div>
        <div class="day-label">MON</div>
        <div class="day-label">TUE</div>
        <div class="day-label">WED</div>
        <div class="day-label">THU</div>
        <div class="day-label">FRI</div>
        <div class="day-label">SAT</div>
        
        <div id="gridData" style="display:contents;">लोड हो रहा है...</div>
    </div>
</div>

<button class="nav-btn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">Go to Top ↑</button>

<div id="unlockContainer">
    <div class="card">
        <h2 style="margin-top:0;">🔒 VIP FULL CHART</h2>
        <p>VIP जोड़ी और पन्ना देखने के लिए अनलॉक करें</p>
        <button class="btn">UNLOCK NOW</button>
    </div>
</div>

<div id="bottom" class="footer-spacer"></div>

<script>
    const SHEET_ID = '1IReRyQjRvWWVjZTym_8DDXvx9Jttjfgy18McY53gM5w';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

    function isRedJodi(jodi) {
        if (!jodi || jodi.trim() === "") return false;
        let cleanJodi = jodi.trim();
        if (cleanJodi.includes('*')) return true;
        let d1 = parseInt(cleanJodi[0]);
        let d2 = parseInt(cleanJodi[1]);
        return (!isNaN(d1) && !isNaN(d2) && (d1 === d2 || Math.abs(d1 - d2) === 5));
    }

    async function fetchChart() {
        try {
            const response = await fetch(CSV_URL);
            const data = await response.text();
            const rows = data.split('\n').map(row => row.split(','));
            let finalHtml = '';

            for (let i = 1; i < rows.length; i++) {
                let row = rows[i];
                if (!row[0] || row[0].trim() === "") continue;

                let dateRange = row[0].replace(/"/g, "").trim();
                finalHtml += `<div class="date-box">${dateRange}</div>`;
                
                let isLocked = false;
                for (let j = 1; j <= 16; j += 3) {
                    let l = row[j] ? row[j].replace(/"/g, "").trim() : "";
                    let jo = row[j+1] ? row[j+1].replace(/"/g, "").trim() : "";
                    let r = row[j+2] ? row[j+2].replace(/"/g, "").trim() : "";

                    if (l && jo && r) {
                        let colorClass = isRedJodi(jo) ? 'red' : '';
                        finalHtml += `
                            <div class="cell">
                                <div class="panna left"><span>${l[0]||''}</span><span>${l[1]||''}</span><span>${l[2]||''}</span></div>
                                <div class="jodi ${colorClass}">${jo}</div>
                                <div class="panna right"><span>${r[0]||''}</span><span>${r[1]||''}</span><span>${r[2]||''}</span></div>
                            </div>`;
                    } else if (!isLocked) {
                        if (jo && jo.includes('*')) {
                             finalHtml += `<div class="cell"><div class="jodi red">${jo}</div></div>`;
                        } else {
                            finalHtml += `<div class="lock">🔒</div>`;
                            isLocked = true;
                        }
                    } else {
                        finalHtml += `<div class="cell"></div>`;
                    }
                }
            }
            document.getElementById('gridData').innerHTML = finalHtml;
        } catch (error) {
            document.getElementById('gridData').innerHTML = "<div style='grid-column: 1/-1; padding:20px;'>Error!</div>";
        }
    }
    fetchChart();
</script>
</body>
</html>
