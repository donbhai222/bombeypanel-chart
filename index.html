        .panna { display: flex; flex-direction: column; font-size: 8px; position: absolute; font-weight: bold; width: 10px; }
        .panna.left { left: 2px; } .panna.right { right: 2px; }
        .jodi { font-size: 18px; font-weight: bold; color: #000; }
        .red-house .jodi, .red-house .panna { color: var(--red) !important; }
        .single-vip-lock { color: #f70031; font-size: 22px; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; width: 85%; max-width: 350px; padding: 20px; border-radius: 15px; }
        input { width: 90%; padding: 10px; margin: 8px 0; border: 2px solid #ccc; border-radius: 8px; }
        .verify-btn { background: #28a745; color: #fff; padding: 12px; border: none; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        .qr-img { width: 180px; height: 180px; margin: 10px auto; display: block; border: 2px solid #eee; }
    </style>
</head>
