<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOMBAY SPECIAL VIP</title>
    <style>
        :root { --gold: #ffcc00; --bg: #000; --grid-border: #999; }
        body { background: var(--bg); color: #fff; font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 0; scroll-behavior: smooth; overflow-x: hidden; }
        
        .header { background: #111; color: var(--gold); padding: 12px; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .header h1 { margin: 0; font-size: 20px; }
        
        .intro-text { background: #1a1a1a; padding: 10px; margin: 10px auto; width: 90%; border: 1px solid var(--gold); font-size: 13px; color: #fff; text-align: center; font-weight: bold; line-height: 1.3; border-radius: 4px; }
        
        .scroll-btn { background: #1a1a1a; color: #fff; padding: 7px 12px; border: 1px solid var(--gold); border-radius: 4px; cursor: pointer; margin: 5px; font-size: 11px; display: inline-block; }

        /* Chart Styling - Pehle Jaisa */
        #chartArea { background: #fff; width: 92%; margin: 5px auto; border: 1px solid var(--grid-border); border-radius: 4px; overflow: hidden; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .chart-grid { display: grid; grid-template-columns: 42px repeat(6, 1fr); width: 100%; }
        
        .day-label, .date-label { background: #000; color: var(--gold); font-weight: bold; font-size: 8px; padding: 6px 0; border: 0.5px solid var(--grid-border); }
        .date-box { background: #f0f0f0; color: #000; font-size: 8px; border: 0.5px solid var(--grid-border); display: flex; align-items: center; justify-content: center; font-weight: bold; min-height: 50px; }
        
        .cell { position: relative; aspect-ratio: 1 / 1.2; background: #fff; border: 0.5px solid var(--grid-border); display: flex; align-items: center; justify-content: center; min-height: 50px; }
        
        /* Panna Vertical Layout */
        .panna { display: flex; flex-direction: column; font-size: 8px; color: #555; position: absolute; line-height: 1; font-weight: bold; width: 9px; text-align: center; }
        .panna.left { left: 1.5px; }
        .panna.right { right: 1.5px; }
        .panna span { display: block; }
        
        .jodi { font-size: 16px; font-weight: bold; color: #000; z-index: 1; }
        .red-house .jodi, .red-house .panna { color: #e31e24 !important; }

        .single-vip-lock { color: var(--gold); font-size: 18px; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.4; } }

        .unlock-btn { background: var(--gold); color: #000; padding: 12px; border: none; width: 90%; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 16px; margin: 15px 0; display: inline-block; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #111; border: 2px solid var(--gold); width: 85%; max-width: 350px; padding: 15px; border-radius: 12px; color: white; }
        .plan-box { border: 1px solid var(--gold); margin: 10px 0; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; background: #222; font-size: 14px; }
        .qr-box { margin-top: 15px; border: 1px dashed var(--gold); padding: 10px; display: none; background: #fff; color: #000; border-radius: 8px; }
        
        input { width: 88%; padding: 10px; margin: 5px; border-radius: 5px; border: 1px solid var(--gold); background: #222; color: #fff; font-size: 14px; }
        .btn-submit { background: #ffcc00; color: #000; border: none; padding: 12px; width: 100%; font-weight: bold; border-radius: 8px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header"><h1>BOMBAY SPECIAL VIP</h1></div>

<div class="intro-text">
    BOMBAY SPECIAL VIP CHART PROVIDES FASTEST RESULTS.<br>
    UNLOCK VIP FOR EXCLUSIVE ACCESS TO JODI AND PANNA.
</div>

<button class="scroll-btn" onclick="document.getElementById('unlockArea').scrollIntoView({behavior: 'smooth'});">Go to Bottom ↓</button>

<div id="chartArea">
    <div class="chart-grid">
        <div class="date-label">DATE</div>
        <div class="day-label">MON</div>
        <div class="day-label">TUE</div>
        <div class="day-label">WED</div>
        <div class="day-label">THU</div>
        <div class="day-label">FRI</div>
        <div class="day-label">SAT</div>
        <div id="gridData" style="display:contents; color: black;">लोड हो रहा है...</div>
    </div>
</div>

<div id="unlockArea">
    <button class="unlock-btn" onclick="openVipModal()">🔒 UNLOCK VIP CHART</button>
</div>

<div id="vipModal" class="overlay">
    <div class="modal-content">
        <div id="modalStep1">
            <h2 style="color:var(--gold); font-size: 18px;">VIP प्लान चुनें</h2>
            <div class="plan-box" onclick="goToStep2('1 दिन के लिए 599')">1 दिन के लिए - ₹599</div>
            <div class="plan-box" onclick="goToStep2('7 दिन के लिए 1299')">7 दिन के लिए - ₹1299</div>
            <div class="plan-box" onclick="goToStep2('30 दिन के लिए 1799')">30 दिन के लिए - ₹1799</div>
            <button onclick="closeVipModal()" style="color:#ccc; background:none; border:none; margin-top:10px; cursor:pointer;">बंद करें</button>
        </div>

        <div id="modalStep2" style="display:none;">
            <input type="text" id="userName" placeholder="अपना नाम लिखें">
            <input type="number" id="userNum" placeholder="WhatsApp नंबर">
            <button class="unlock-btn" style="width:95%;" onclick="showQR()">पेमेंट QR दिखाएं</button>
            <div id="qrBox" class="qr-box">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=omkaryadavsonu8888-1@oksbi%26pn=Omkar%20Yadav%26cu=INR" style="width:150px;">
                <p style="margin:5px 0; color:#000; font-size: 14px;"><b>Omkar Yadav</b></p>
                <input type="number" id="paymentAmount" placeholder="Amount">
                <input type="text" id="utrNumber" placeholder="UTR Number">
                <button class="btn-submit" onclick="startVerification()">सबमिट करें</button>
            </div>
        </div>
    </div>
</div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/1IReRyQjRvWWVjZTym_8DDXvx9Jttjfgy18McY53gM5w/export?format=csv";

    function openVipModal() { document.getElementById('vipModal').style.display = 'flex'; }
    function closeVipModal() { document.getElementById('vipModal').style.display = 'none'; }
    function goToStep2(p) { document.getElementById('modalStep1').style.display = 'none'; document.getElementById('modalStep2').style.display = 'block'; }
    function showQR() { document.getElementById('qrBox').style.display = 'block'; }
    
    function startVerification() {
        alert("Verification started. Details sent to admin.");
        location.reload();
    }

    async function loadChart() {
        try {
            const res = await fetch(CSV_URL + "&cache=" + new Date().getTime());
            const data = await res.text();
            const rows = data.split('\n').map(r => r.split(','));
            let h = '';
            let lockPlaced = false;

            for(let i=1; i<rows.length; i++) {
                if(!rows[i][0]) continue;
                h += `<div class="date-box">${rows[i][0].replace(/"/g,"")}</div>`;
                
                for(let j=1; j<=16; j+=3) {
                    let l = (rows[i][j]||"").trim();
                    let jo = (rows[i][j+1]||"").trim();
                    let r = (rows[i][j+2]||"").trim();

                    if(!l && !jo && !r) {
                        if(!lockPlaced) { h += `<div class="cell"><div class="single-vip-lock">🔒</div></div>`; lockPlaced=true; }
                        else { h += `<div class="cell"></div>`; }
                    } else {
                        let isRed = false;
                        if(jo.length>=2 && (jo[0]===jo[1] || Math.abs(parseInt(jo[0])-parseInt(jo[1]))===5)) isRed=true;
                        if(jo.includes('*')) isRed=true;
                        
                        let rc = isRed ? 'red-house' : '';
                        let lh = l.split('').map(s=>`<span>${s}</span>`).join('');
                        let rh = r.split('').map(s=>`<span>${s}</span>`).join('');
                        h += `<div class="cell ${rc}"><div class="panna left">${lh}</div><div class="jodi">${jo}</div><div class="panna right">${rh}</div></div>`;
                    }
                }
            }
            document.getElementById('gridData').innerHTML = h;
        } catch(e) { document.getElementById('gridData').innerHTML = "Error loading chart"; }
    }
    loadChart();
</script>
</body>
</html>
