<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOMBAY SPECIAL VIP</title>
    <style>
        :root { --gold: #ffcc00; --bg: #000; --grid-border: #444; }
        body { background: var(--bg); color: #fff; font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 0; }
        
        .header { background: #111; color: var(--gold); padding: 15px; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        
        .intro-text { background: #1a1a1a; padding: 10px; margin: 10px auto; width: 92%; border: 1px solid var(--gold); font-size: 13px; color: #ccc; text-align: justify; }
        
        #chartArea { background: #000; width: 98%; margin: 10px auto; border: 1px solid var(--grid-border); }
        .chart-grid { display: grid; grid-template-columns: 50px repeat(6, 1fr); width: 100%; }
        .day-label, .date-label { background: #222; color: var(--gold); font-weight: bold; font-size: 10px; padding: 10px 0; border: 0.5px solid var(--grid-border); }
        .date-box { background: #111; color: #fff; font-size: 9px; border: 0.5px solid var(--grid-border); display: flex; align-items: center; justify-content: center; }
        .cell { position: relative; aspect-ratio: 1 / 1.1; background: #000; border: 0.5px solid var(--grid-border); display: flex; align-items: center; justify-content: center; }
        .panna { display: flex; flex-direction: column; font-size: 8px; color: var(--gold); position: absolute; line-height: 1; }
        .panna.left { left: 2px; }
        .panna.right { right: 2px; }
        .jodi { font-size: 18px; font-weight: bold; color: #fff; }
        .red { color: #ff0000 !important; }
        .lock { color: #555; font-size: 14px; }

        /* VIP Button & Sections */
        .vip-container { margin: 20px auto; width: 90%; max-width: 400px; }
        .unlock-btn { background: var(--gold); color: #000; padding: 15px; border: none; width: 100%; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 18px; box-shadow: 0 0 15px var(--gold); }
        
        .hidden-section { display: none; background: #111; border: 2px solid var(--gold); padding: 15px; border-radius: 10px; margin-top: 15px; }
        
        .plan-box { border: 1px solid var(--gold); margin: 10px 0; padding: 10px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .plan-box:hover { background: #222; }
        .plan-box.selected { background: var(--gold); color: #000; }

        input { width: 90%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid var(--gold); color: #fff; border-radius: 5px; }
        .qr-box { margin: 15px 0; border: 1px dashed var(--gold); padding: 10px; display: none; }
        .btn-final { background: #25D366; color: #fff; border: none; padding: 12px; width: 100%; font-weight: bold; border-radius: 5px; cursor: pointer; display: none; }
    </style>
</head>
<body>

<div class="header"><h1>BOMBAY SPECIAL VIP</h1></div>

<div class="intro-text">
    <p>BOMBAY SPECIAL VIP CHART provides fastest results. Unlock VIP for exclusive access.</p>
</div>

<div id="chartArea">
    <div class="chart-grid">
        <div class="date-label">DATE</div>
        <div class="day-label">MON</div><div class="day-label">TUE</div><div class="day-label">WED</div>
        <div class="day-label">THU</div><div class="day-label">FRI</div><div class="day-label">SAT</div>
        <div id="gridData" style="display:contents;">लोड हो रहा है...</div>
    </div>
</div>

<div class="vip-container">
    <button class="unlock-btn" id="mainUnlockBtn" onclick="showPlans()">🔒 UNLOCK VIP CHART</button>

    <div id="stepPlans" class="hidden-section">
        <h3 style="color:var(--gold); margin-top:0;">प्लान चुनें</h3>
        <div class="plan-box" onclick="selectPlan(this, '7 दिन के लिए 1299')">7 दिन के लिए - ₹1299</div>
        <div class="plan-box" onclick="selectPlan(this, '30 दिन के लिए 1799')">30 दिन के लिए - ₹1799</div>
    </div>

    <div id="stepForm" class="hidden-section">
        <input type="text" id="userName" placeholder="अपना नाम डालें">
        <input type="number" id="userNum" placeholder="WhatsApp नंबर डालें">
        <button class="unlock-btn" style="font-size:14px;" onclick="showQR()">आगे बढ़ें (Get QR)</button>
        
        <div id="qrBox" class="qr-box">
            <p style="color:var(--gold); font-size:12px;">पेमेंट के लिए QR स्कैन करें</p>
            <img src="YOUR_QR_IMAGE_LINK" alt="QR Code" style="width:180px; height:180px;">
            <p style="font-size:11px;">पेमेंट करने के बाद नीचे बटन दबाएं</p>
            <button class="btn-final" id="waBtn" onclick="sendToWhatsApp()">पेमेंट कर दिया (WhatsApp)</button>
        </div>
    </div>
</div>

<script>
    let selectedPlanText = "";

    function showPlans() {
        document.getElementById('mainUnlockBtn').style.display = 'none';
        document.getElementById('stepPlans').style.display = 'block';
    }

    function selectPlan(el, plan) {
        selectedPlanText = plan;
        document.querySelectorAll('.plan-box').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('stepForm').style.display = 'block';
    }

    function showQR() {
        if(document.getElementById('userName').value == "" || document.getElementById('userNum').value == "") {
            alert("कृपया नाम और नंबर डालें");
            return;
        }
        document.getElementById('qrBox').style.display = 'block';
        document.getElementById('waBtn').style.display = 'block';
    }

    function sendToWhatsApp() {
        let name = document.getElementById('userName').value;
        let num = document.getElementById('userNum').value;
        let msg = `नमस्ते! मेरा नाम ${name} है। मेरा नंबर ${num} है। मैंने ${selectedPlanText} का प्लान चुना है और पेमेंट कर दिया है। कृपया मुझे VIP ग्रुप में जोड़ें।`;
        window.location.href = `https://wa.me/91XXXXXXXXXX?text=${encodeURIComponent(msg)}`;
    }

    // चार्ट लोड करने का फंक्शन (वही पुराना)
    const SHEET_ID = '1IReRyQjRvWWVjZTym_8DDXvx9Jttjfgy18McY53gM5w';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

    async function loadChart() {
        try {
            const res = await fetch(CSV_URL);
            const data = await res.text();
            const rows = data.split('\n').map(r => r.split(','));
            let h = '';
            for(let i=1; i<rows.length; i++) {
                if(!rows[i][0]) continue;
                h += `<div class="date-box">${rows[i][0].replace(/"/g,"")}</div>`;
                for(let j=1; j<=16; j+=3) {
                    let jo = (rows[i][j+1]||"").replace(/"/g,"").trim();
                    if(jo && jo!=="" && jo!=="XX" && !jo.includes('?')) {
                        h += `<div class="cell"><div class="jodi">${jo}</div></div>`;
                    } else {
                        h += `<div class="cell"><div class="lock">🔒</div></div>`;
                    }
                }
            }
            document.getElementById('gridData').innerHTML = h;
        } catch(e) { console.log(e); }
    }
    loadChart();
</script>

</body>
</html>
