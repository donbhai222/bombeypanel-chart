<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOMBAY SPECIAL VIP</title>
    <style>
        :root { --gold: #ffcc00; --cyan: #008b8b; --bg: #f4f4f4; }
        body { background: var(--bg); color: #000; font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 0; }
        .header { background: #111; color: #fff; padding: 15px; border-bottom: 2px solid var(--gold); margin-bottom: 10px; }
        
        /* Navigation Buttons */
        .nav-btn { background: #333; color: #fff; padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; margin: 10px; font-weight: bold; text-decoration: none; display: inline-block; }

        /* CHART STYLE - White Background */
        #chartArea { background: #fff; width: 98%; margin: 10px auto; border-radius: 8px; overflow: hidden; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        
        /* Table Header for Days */
        .days-header { display: flex; background: #333; color: #fff; font-weight: bold; border-bottom: 2px solid var(--gold); width: 100%; }
        .day-label { flex: 1; padding: 10px 2px; font-size: 12px; border-right: 1px solid #555; }
        .date-label { width: 65px; border-right: 1px solid #555; display: flex; align-items: center; justify-content: center; font-size: 11px; }

        .week-row { display: flex; border-bottom: 1px solid #ddd; background: #fff; min-height: 80px; }
        .date-box { 
            width: 65px; background: #e0f7fa; color: #000; font-size: 12px; font-weight: bold; 
            display: flex; align-items: center; justify-content: center; flex-direction: column; line-height: 1.4; border-right: 2px solid #ccc;
        }
        .grid { display: flex; flex: 1; background: #fff; }
        .cell { flex: 1; border-right: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; padding: 2px; }
        .panna { display: flex; flex-direction: column; font-size: 10px; color: #666; font-weight: bold; line-height: 1.1; }
        .jodi { flex: 1; font-size: 20px; font-weight: bold; text-align: center; color: #000; }
        .lock { background: #f9f9f9; color: #888; display: flex; align-items: center; justify-content: center; font-size: 20px; flex: 1; }
        .red { color: #ff0000; }

        /* SUBSCRIPTION CARD */
        .card { background: #fff; border: 2px solid #ddd; margin: 20px auto; padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; }
        .plan-box { display: flex; justify-content: space-between; gap: 10px; margin-top: 15px; }
        .plan-btn { flex: 1; background: #fdfdfd; border: 1px solid #ccc; padding: 15px 5px; border-radius: 10px; cursor: pointer; }
        .plan-btn b { color: #d4af37; font-size: 18px; }
        .btn { padding: 15px 30px; background: #111; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; color: #fff; width: 100%; margin-top: 15px; }
        input { padding: 12px; margin: 10px 0; width: 90%; border: 1px solid #ccc; border-radius: 5px; }
        .admin-link { color: #ccc; font-size: 10px; padding: 40px; display: block; }
    </style>
</head>
<body>

<div class="header" id="top"><h1>BOMBAY SPECIAL VIP</h1></div>

<button class="nav-btn" onclick="document.getElementById('bottom').scrollIntoView({behavior: 'smooth'})">Go to Bottom ↓</button>

<div id="chartArea">
    <div class="days-header">
        <div class="date-label">DATE</div>
        <div class="day-label">MON</div>
        <div class="day-label">TUE</div>
        <div class="day-label">WED</div>
        <div class="day-label">THU</div>
        <div class="day-label">FRI</div>
        <div class="day-label">SAT</div>
    </div>
    <div id="chartData">चार्ट लोड हो रहा है...</div>
</div>

<button class="nav-btn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">Go to Top ↑</button>

<div id="unlockContainer">
    <div class="card" id="mainAction">
        <h2 style="color:#111; margin-top:0;">🔒 VIP FULL CHART</h2>
        <p>VIP जोड़ी और पन्ना देखने के लिए अनलॉक करें</p>
        <button class="btn" onclick="openStep('planStep')">UNLOCK NOW</button>
    </div>

    <div class="card" id="planStep" style="display:none;">
        <h3>प्लान चुनें</h3>
        <div class="plan-box">
            <div class="plan-btn" onclick="selectPlan('7 दिन', '1299')"><span>7 दिन</span><b>₹1299</b></div>
            <div class="plan-btn" onclick="selectPlan('30 दिन', '1799')"><span>30 दिन</span><b>₹1799</b></div>
        </div>
    </div>

    <div class="card" id="formStep" style="display:none;">
        <h3 id="selectedPlanText">विवरण भरें</h3>
        <input type="text" id="custName" placeholder="अपना नाम">
        <input type="number" id="custMob" placeholder="मोबाइल नंबर">
        <button class="btn" onclick="openStep('payStep')">आगे बढ़ें</button>
    </div>

    <div class="card" id="payStep" style="display:none;">
        <h3>स्कैन करें</h3>
        <img src="scanner.jpg.jpeg" style="width:200px; border:1px solid #ddd;">
        <p id="finalAmountText" style="font-weight:bold;"></p>
        <button class="btn" style="background:#25D366;" onclick="whatsappMe()">✅ WhatsApp पर भेजें</button>
    </div>
</div>

<div id="bottom"></div>
<span class="admin-link" onclick="adminGo()">Admin Login</span>

<script>
    const SHEET_ID = '1IReRyQjRvWWVjZTym_8DDXvx9Jttjfgy18McY53gM5w';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

    async function fetchChart() {
        try {
            const response = await fetch(CSV_URL);
            const data = await response.text();
            const rows = data.split('\n').map(row => row.split(','));
            let finalHtml = '';

            for (let i = 1; i < rows.length; i++) {
                let row = rows[i];
                if (!row[0] || row[0].trim() === "") continue;

                let dateRange = row[0].replace(/"/g, "").trim();
                finalHtml += `<div class="week-row"><div class="date-box">${dateRange}</div><div class="grid">`;
                
                let isLocked = false;
                for (let j = 1; j <= 16; j += 3) {
                    let l = row[j] ? row[j].replace(/"/g, "").trim() : "";
                    let jo = row[j+1] ? row[j+1].replace(/"/g, "").trim() : "";
                    let r = row[j+2] ? row[j+2].replace(/"/g, "").trim() : "";

                    if (l && jo && r) {
                        let colorClass = (jo === "RR" || jo.includes('!!')) ? 'red' : '';
                        finalHtml += `
                            <div class="cell">
                                <div class="panna"><span>${l[0]}</span><span>${l[1]}</span><span>${l[2]}</span></div>
                                <div class="jodi ${colorClass}">${jo}</div>
                                <div class="panna"><span>${r[0]}</span><span>${r[1]}</span><span>${r[2]}</span></div>
                            </div>`;
                    } else if (!isLocked) {
                        finalHtml += `<div class="lock">🔒</div>`;
                        isLocked = true;
                    } else {
                        finalHtml += `<div class="cell" style="background:#fefefe"></div>`;
                    }
                }
                finalHtml += `</div></div>`;
            }
            document.getElementById('chartData').innerHTML = finalHtml;
        } catch (error) {
            document.getElementById('chartData').innerHTML = "डाटा लोड करने में समस्या!";
        }
    }

    function openStep(id) {
        ['mainAction', 'planStep', 'formStep', 'payStep'].forEach(s => document.getElementById(s).style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function selectPlan(p, a) {
        selectedPlan = p; selectedAmount = a;
        document.getElementById('selectedPlanText').innerText = p + " - ₹" + a;
        document.getElementById('finalAmountText').innerText = "कुल: ₹" + a;
        openStep('formStep');
    }

    function whatsappMe() {
        let n = document.getElementById('custName').value;
        let m = document.getElementById('custMob').value;
        let text = `नमस्ते, मैंने पेमेंट कर दिया है।%0Aनाम: ${n}%0Aप्लान: ${selectedPlan}`;
        window.open(`https://wa.me/918103982813?text=${text}`);
    }

    function adminGo() {
        if(prompt("Pin:") === "123") window.open(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit`);
    }

    fetchChart();
</script>
</body>
</html>
