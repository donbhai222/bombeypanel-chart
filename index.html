<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOMBAY SPECIAL VIP</title>
    <style>
        :root { --gold: #ffcc00; --bg: #000; --grid-border: #999; }
        body { background: var(--bg); color: #fff; font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 0; scroll-behavior: smooth; }
        
        .header { background: #111; color: var(--gold); padding: 15px; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        
        .intro-text { background: #1a1a1a; padding: 10px; margin: 10px auto; width: 88%; border: 1px solid var(--gold); font-size: 13px; color: #ccc; text-align: justify; }
        
        #chartArea { background: #fff; width: 94%; margin: 10px auto; border: 1px solid var(--grid-border); border-radius: 4px; overflow: hidden; }
        .chart-grid { display: grid; grid-template-columns: 45px repeat(6, 1fr); width: 100%; }
        
        .day-label, .date-label { background: #000; color: var(--gold); font-weight: bold; font-size: 9px; padding: 8px 0; border: 0.5px solid var(--grid-border); }
        .date-box { background: #f0f0f0; color: #000; font-size: 8.5px; border: 0.5px solid var(--grid-border); display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        .cell { position: relative; aspect-ratio: 1 / 1.1; background: #fff; border: 0.5px solid var(--grid-border); display: flex; align-items: center; justify-content: center; }
        .panna { display: flex; flex-direction: column; font-size: 7.5px; color: #666; position: absolute; line-height: 1; font-weight: bold; }
        .panna.left { left: 1.5px; }
        .panna.right { right: 1.5px; }
        .jodi { font-size: 17px; font-weight: bold; color: #000; z-index: 1; }

        .red-house .jodi, .red-house .panna { color: #e31e24 !important; }
        .lock { color: #ccc; font-size: 13px; }

        .scroll-btn { background: #1a1a1a; color: #fff; padding: 8px 15px; border: 1px solid var(--gold); border-radius: 4px; cursor: pointer; margin: 10px; font-size: 12px; }
        .unlock-btn { background: var(--gold); color: #000; padding: 15px; border: none; width: 90%; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 18px; margin: 20px 0; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; overflow-y: auto; align-items: center; justify-content: center; }
        .modal-content { background: #111; border: 2px solid var(--gold); width: 90%; max-width: 400px; padding: 20px; border-radius: 12px; margin: 20px auto; position: relative; }
        .close-modal { position: absolute; top: 10px; right: 15px; color: var(--gold); font-size: 25px; cursor: pointer; }

        .plan-box { border: 1px solid var(--gold); margin: 12px 0; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; color: #fff; }
        .plan-box.selected { background: var(--gold); color: #000; }
        
        input { width: 90%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid var(--gold); color: #fff; border-radius: 6px; font-size: 16px; }
        .qr-box { margin-top: 20px; border: 1px dashed var(--gold); padding: 15px; display: none; background: #fff; border-radius: 8px; }
        .btn-wa { background: #25D366; color: #fff; border: none; padding: 15px; width: 100%; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="header"><h1>BOMBAY SPECIAL VIP</h1></div>

<div class="intro-text">
    <p>BOMBAY SPECIAL VIP CHART provides fastest results. Unlock VIP for exclusive access.</p>
</div>

<button class="scroll-btn" onclick="document.getElementById('unlockArea').scrollIntoView();">Go to Bottom ↓</button>

<div id="chartArea">
    <div class="chart-grid">
        <div class="date-label">DATE</div>
        <div class="day-label">MON</div><div class="day-label">TUE</div><div class="day-label">WED</div>
        <div class="day-label">THU</div><div class="day-label">FRI</div><div class="day-label">SAT</div>
        <div id="gridData" style="display:contents;">लोड हो रहा है...</div>
    </div>
</div>

<div id="unlockArea">
    <button class="unlock-btn" onclick="openVipModal()">🔒 UNLOCK VIP CHART</button>
</div>

<button class="scroll-btn" onclick="window.scrollTo(0,0);" style="margin-bottom: 40px;">Go to Top ↑</button>

<div id="vipModal" class="overlay">
    <div class="modal-content">
        <span class="close-modal" onclick="closeVipModal()">&times;</span>
        
        <div id="modalStep1">
            <h2 style="color:var(--gold);">VIP प्लान चुनें</h2>
            <div class="plan-box" onclick="goToStep2(this, '7 दिन के लिए 1299')">7 दिन के लिए - ₹1299</div>
            <div class="plan-box" onclick="goToStep2(this, '30 दिन के लिए 1799')">30 दिन के लिए - ₹1799</div>
        </div>

        <div id="modalStep2" style="display:none;">
            <h3 style="color:var(--gold);">अपनी जानकारी भरें</h3>
            <input type="text" id="userName" placeholder="अपना नाम लिखें">
            <input type="number" id="userNum" placeholder="WhatsApp नंबर">
            <button class="unlock-btn" style="font-size:14px;" onclick="showQR()">पेमेंट के लिए QR निकालें</button>
            
            <div id="qrBox" class="qr-box">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=PAYMENT_INFO" alt="QR Code" style="width:180px; height:180px;">
                <p style="font-size:12px; color:#000; margin-top:10px; font-weight:bold;">स्कैन करके पेमेंट करें</p>
            </div>
            <button class="btn-wa" id="finalWaBtn" onclick="sendToWhatsApp()">पेमेंट कर दिया (WhatsApp)</button>
        </div>
    </div>
</div>

<script>
    let selectedPlanText = "";

    function openVipModal() { document.getElementById('vipModal').style.display = 'flex'; }
    function closeVipModal() { 
        document.getElementById('vipModal').style.display = 'none';
        document.getElementById('modalStep1').style.display = 'block';
        document.getElementById('modalStep2').style.display = 'none';
    }

    function goToStep2(el, plan) {
        selectedPlanText = plan;
        document.getElementById('modalStep1').style.display = 'none';
        document.getElementById('modalStep2').style.display = 'block';
    }

    function showQR() {
        if(document.getElementById('userName').value == "" || document.getElementById('userNum').value == "") {
            alert("नाम और नंबर डालना जरूरी है!");
            return;
        }
        document.getElementById('qrBox').style.display = 'block';
        document.getElementById('finalWaBtn').style.display = 'block';
    }

    function sendToWhatsApp() {
        let name = document.getElementById('userName').value;
        let num = document.getElementById('userNum').value;
        let myNumber = "919999999999"; // अपना असली नंबर यहाँ डालें (91 के साथ)
        let msg = `नमस्ते! मेरा नाम ${name} है। मेरा नंबर ${num} है। मैंने ${selectedPlanText} वाला प्लान चुना है और पेमेंट कर दिया है।`;
        
        // सुरक्षित लिंक फॉर्मैट
        let url = "https://api.whatsapp.com/send?phone=" + myNumber + "&text=" + encodeURIComponent(msg);
        window.open(url, '_blank');
    }

    // चार्ट डेटा फंक्शन
    const SHEET_ID = '1IReRyQjRvWWVjZTym_8DDXvx9Jttjfgy18McY53gM5w';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

    function isRedHouse(j) {
        if(!j || j.includes('X')) return false;
        let cleanJ = j.replace(/"/g,"").trim();
        if(cleanJ.includes('*')) return true;
        if(cleanJ.length >= 2) {
            let d1 = parseInt(cleanJ[0]); let d2 = parseInt(cleanJ[1]);
            if(!isNaN(d1) && !isNaN(d2)) return (d1 === d2 || Math.abs(d1 - d2) === 5);
        }
        return false;
    }

    async function loadChart() {
        try {
            const res = await fetch(CSV_URL);
            const data = await res.text();
            const rows = data.split('\n').map(r => r.split(','));
            let h = '';
            for(let i=1; i<rows.length; i++) {
                if(!rows[i][0]) continue;
                h += `<div class="date-box">${rows[i][0].replace(/"/g,"")}</div>`;
                for(let j=1; j<=16; j+=3) {
                    let l=(rows[i][j]||'').trim(), jo=(rows[i][j+1]||'').trim(), r=(rows[i][j+2]||'').trim();
                    jo = jo.replace(/"/g,"");
                    if(jo && jo!=="" && jo!=="XX" && !jo.includes('?')) {
                        let redClass = isRedHouse(jo) ? 'red-house' : '';
                        let lh = l.split('').map(s=>`<span>${s}</span>`).join('');
                        let rh = r.split('').map(s=>`<span>${s}</span>`).join('');
                        h += `<div class="cell ${redClass}"><div class="panna left">${lh}</div><div class="jodi">${jo}</div><div class="panna right">${rh}</div></div>`;
                    } else { h += `<div class="cell"><div class="lock">🔒</div></div>`; }
                }
            }
            document.getElementById('gridData').innerHTML = h;
        } catch(e) { console.log(e); }
    }
    loadChart();
</script>

</body>
</html>
