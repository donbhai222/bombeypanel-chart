<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOMBAY SPECIAL VIP CHART</title>
    <style>
        :root { --dark-blue: #1a024d; --gold: #FFD700; --vip-red: #e31e24; --grid-border: #000; }
        body { background: #FFBF82; color: var(--dark-blue); font-family: 'Arial', sans-serif; text-align: center; margin: 0; padding-bottom: 60px; overflow-x: hidden; }
        
        .header { background: var(--dark-blue); padding: 10px; border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .header h1 { margin: 0; font-size: 16px; color: var(--gold); text-transform: uppercase; font-weight: 900; }

        /* CHART CONTAINER - 96% width ताकि साइड में हल्की जगह रहे और सब फिट आए */
        #chartWrapper { 
            width: 96%; 
            margin: 10px auto; 
            background: #fff;
            border: 1px solid #000;
            border-radius: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            overflow: hidden; /* No scroll, direct fit */
        }

        table { 
            border-collapse: collapse; 
            width: 100%; 
            table-layout: fixed; /* इससे सारे सेल बराबर साइज के रहेंगे */
        }
        
        th { background: #ffff00; color: #000; font-size: 9px; padding: 6px 0; border: 1px solid var(--grid-border); font-weight: 900; }
        
        /* FULL FIT CELL LOGIC */
        td { 
            border: 1px solid var(--grid-border); 
            height: 52px !important; 
            background: #fff; 
            vertical-align: middle;
            text-align: center;
            padding: 0;
        }
        
        /* Date column width reduced to fit others */
        .date-box { background: #f0f0f0 !important; font-size: 8.5px; font-weight: 900; color: #000; width: 45px !important; }
        
        .cell-content { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; gap: 1px; }
        .panna-vertical { display: flex; flex-direction: column; font-size: 8px; font-weight: bold; line-height: 1; width: 9px; letter-spacing: -0.5px; }
        .jodi { font-size: 19px; font-weight: 900; color: #000; letter-spacing: -1px; }
        
        .red-house .jodi, .red-house .panna-vertical { color: var(--vip-red) !important; }
        .lock-btn { color: var(--vip-red); font-size: 18px; cursor: pointer; }

        .btn-pay-main { background: var(--vip-red); color: white; padding: 12px; border: none; border-radius: 6px; width: 90%; font-weight: bold; font-size: 16px; margin: 15px 0; cursor: pointer; }

        /* Floating Buttons Smaller */
        .float-btn { position: fixed; right: 8px; background: var(--vip-red); color: white; border: 1.5px solid #fff; border-radius: 50%; font-weight: bold; z-index: 9999; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .go-top { bottom: 60px; } 
        .go-bottom { bottom: 15px; }

        /* Modal Fit */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; width: 90%; max-width: 320px; padding: 15px; border-radius: 10px; border: 3px solid var(--gold); }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="header"><h1>BOMBAY SPECIAL VIP CHART</h1></div>

<div id="chartWrapper">
    <table>
        <thead>
            <tr>
                <th style="width:45px;">DATE</th>
                <th>MON</th><th>TUE</th><th>WED</th><th>THU</th><th>FRI</th><th>SAT</th>
            </tr>
        </thead>
        <tbody id="gridData"></tbody>
    </table>
</div>

<button class="btn-pay-main" onclick="openVipModal()">JOIN VIP / लॉक खोलें 🔑</button>

<div class="float-btn go-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'});">↑</div>
<div class="float-btn go-bottom" onclick="window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});">↓</div>

<div id="vipModal" class="overlay">
    <div class="modal-content">
        <div id="step1">
            <h3 style="margin:0; font-size:18px;">VIP Registration</h3>
            <input type="text" id="vName" placeholder="अपना नाम">
            <input type="number" id="vPhone" placeholder="मोबाइल नंबर">
            <button class="btn-pay-main" style="width:100%;" onclick="goNext()">Next</button>
            <p onclick="closeVipModal()" style="color:red; cursor:pointer; font-weight:bold; font-size:12px;">CLOSE</p>
        </div>
        <div id="step2" style="display:none;">
            <p>Pay: <b>OMKAR YADAV</b></p>
            <img src="paytm-png.jpeg" style="width:130px; border:1px solid #000;">
            <input type="number" id="utrVal" placeholder="12 Digit UTR Number">
            <button class="btn-pay-main" style="width:100%;" onclick="verify()">Verify</button>
        </div>
        <div id="step3" style="display:none;"><h3>Verifying...</h3><div id="timerBox" style="font-size:35px; color:red; font-weight:bold;">02:00</div></div>
        <div id="step4" style="display:none;"><h3 style="color:green;">SUBMITTED ✅</h3><button class="btn-pay-main" style="width:100%;" onclick="closeVipModal()">DONE</button></div>
    </div>
</div>

<script>
    const CSV = "https://docs.google.com/spreadsheets/d/1IReRyQjRvWWVjZTym_8DDXvx9Jttjfgy18McY53gM5w/export?format=csv&gid=0";

    function openVipModal() { document.getElementById('vipModal').style.display='flex'; resetModal(); }
    function closeVipModal() { document.getElementById('vipModal').style.display='none'; }
    function resetModal() { document.getElementById('step1').style.display='block'; ['step2','step3','step4'].forEach(id => document.getElementById(id).style.display='none'); }
    function goNext() { if(document.getElementById('vName').value == "" || document.getElementById('vPhone').value.length < 10) { alert("Details fill karein"); return; } document.getElementById('step1').style.display='none'; document.getElementById('step2').style.display='block'; }
    function verify() { if(document.getElementById('utrVal').value.length < 10) { alert("Invalid UTR"); return; } document.getElementById('step2').style.display='none'; document.getElementById('step3').style.display='block'; startTimer(); }

    function startTimer() {
        let t = 120;
        let x = setInterval(() => {
            let m=Math.floor(t/60), s=t%60;
            document.getElementById('timerBox').innerText = `0${m}:${s<10?'0'+s:s}`;
            if(t-- <= 0) { clearInterval(x); document.getElementById('step3').style.display='none'; document.getElementById('step4').style.display='block'; }
        }, 1000);
    }

    async function loadChart() {
        try {
            const res = await fetch(CSV + "&cache=" + Date.now());
            const data = await res.text();
            const rows = data.split('\n').filter(r => r.trim() !== '').map(r => r.split(','));
            let html = '', lockShown = false;

            for(let i=1; i<rows.length; i++) {
                let d = (rows[i][0] || "").trim(); if(!d) continue;
                html += `<tr><td class="date-box">${d}</td>`;
                for(let j=1; j<=16; j+=3) {
                    let lp=(rows[i][j]||"").trim(), jd=(rows[i][j+1]||"").trim(), rp=(rows[i][j+2]||"").trim();
                    if(!jd && !lp) {
                        if(!lockShown) { html += `<td onclick="openVipModal()"><span class="lock-btn">🔒</span></td>`; lockShown = true; }
                        else html += `<td></td>`;
                    } else {
                        let isRed = (jd.length==2 && (jd[0]==jd[1] || Math.abs(jd[0]-jd[1])==5));
                        html += `<td class="${isRed?'red-house':''}">
                            <div class="cell-content">
                                <div class="panna-vertical">${lp.split('').map(n=>`<span>${n}</span>`).join('')}</div>
                                <div class="jodi">${jd}</div>
                                <div class="panna-vertical">${rp.split('').map(n=>`<span>${n}</span>`).join('')}</div>
                            </div>
                        </td>`;
                    }
                }
                html += `</tr>`;
            }
            document.getElementById('gridData').innerHTML = html;
        } catch(e) { console.log(e); }
    }
    window.onload = loadChart;
</script>
</body>
</html>
