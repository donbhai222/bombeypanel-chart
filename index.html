<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOMBAY SPECIAL VIP - Golden Panel Chart</title>
    <style>
        /* Golden Panel Website Colors */
        :root { 
            --gold-bg: rgb(255, 191, 130); 
            --yellow-accent: rgb(249, 231, 159);
            --dark-blue: rgb(38, 4, 112);
            --grid-border: #999; 
            --red: #e31e24;
        }

        body { 
            background: var(--gold-bg); 
            color: var(--dark-blue); 
            font-family: 'Roboto', Arial, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 0; 
            scroll-behavior: smooth; 
        }

        /* Header Style Like Golden Panel */
        .header { 
            background: var(--gold-bg); 
            padding: 20px; 
            border-bottom: 5px solid #fff; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }
        .header h1 { 
            margin: 0; 
            font-size: 24px; 
            color: var(--red); 
            font-style: italic;
            font-weight: 900;
        }

        .intro-text { 
            background: var(--yellow-accent); 
            padding: 15px; 
            margin: 15px auto; 
            width: 90%; 
            border: 3px solid #fff; 
            font-size: 13px; 
            color: var(--dark-blue); 
            font-weight: bold; 
            border-radius: 15px; 
        }

        .scroll-btn { 
            background: #65bbf5; 
            color: var(--dark-blue); 
            padding: 10px 20px; 
            border: 4px solid #fff; 
            border-radius: 15px; 
            cursor: pointer; 
            margin: 10px; 
            font-size: 14px; 
            font-weight: 700; 
        }

        /* Chart Area - Professional Table */
        #chartArea { 
            background: #fff; 
            width: 95%; 
            margin: 10px auto; 
            border: 2px solid var(--grid-border); 
            border-radius: 8px; 
            overflow: hidden; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .chart-grid { display: grid; grid-template-columns: 45px repeat(6, 1fr); width: 100%; }
        
        .day-label, .date-label { 
            background: #000; 
            color: var(--yellow-accent); 
            font-weight: bold; 
            font-size: 9px; 
            padding: 10px 0; 
            border: 0.5px solid var(--grid-border); 
        }
        
        .date-box { 
            background: #f2f2f2; 
            color: #000; 
            font-size: 8px; 
            border: 0.5px solid var(--grid-border); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            min-height: 55px; 
        }
        
        .cell { 
            position: relative; 
            background: #fff; 
            border: 0.5px solid var(--grid-border); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 55px; 
        }
        
        /* Panna Vertical Layout */
        .panna { 
            display: flex; 
            flex-direction: column; 
            font-size: 8px; 
            color: #555; 
            position: absolute; 
            line-height: 1; 
            font-weight: bold; 
            width: 10px; 
            text-align: center; 
        }
        .panna.left { left: 2px; }
        .panna.right { right: 2px; }
        .panna span { display: block; }
        
        .jodi { font-size: 18px; font-weight: bold; color: #000; z-index: 1; }
        .red-house .jodi, .red-house .panna { color: var(--red) !important; }

        .single-vip-lock { color: #f70031; font-size: 20px; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.4; } }

        /* Payment/Unlock Section Style */
        .unlock-btn { 
            background: #4fb5f5; 
            color: var(--dark-blue); 
            padding: 15px; 
            border: 8px solid var(--yellow-accent); 
            width: 85%; 
            font-weight: 900; 
            border-radius: 20px; 
            cursor: pointer; 
            font-size: 18px; 
            margin: 20px 0; 
        }

        .overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            z-index: 2000; 
            align-items: center; justify-content: center; 
        }
        .modal-content { 
            background: var(--gold-bg); 
            border: 4px solid #fff; 
            width: 85%; max-width: 350px; 
            padding: 20px; border-radius: 20px; 
        }
        .plan-box { 
            border: 2px solid var(--dark-blue); 
            margin: 10px 0; padding: 12px; 
            border-radius: 10px; cursor: pointer; 
            font-weight: bold; background: var(--yellow-accent); 
            color: var(--dark-blue);
        }
    </style>
</head>
<body>

<div class="header"><h1>GOLDEN PANEL VIP CHART</h1></div>

<div class="intro-text">
    <strong>People get more from Game with a GOLDEN PANEL CHART.</strong><br>
    Unlock VIP for Exclusive access to Jodi and Panna.
</div>

<button class="scroll-btn" onclick="document.getElementById('unlockArea').scrollIntoView({behavior: 'smooth'});">Go to Bottom</button>

<div id="chartArea">
    <div class="chart-grid">
        <div class="date-label">DATE</div>
        <div class="day-label">MON</div>
        <div class="day-label">TUE</div>
        <div class="day-label">WED</div>
        <div class="day-label">THU</div>
        <div class="day-label">FRI</div>
        <div class="day-label">SAT</div>
        <div id="gridData" style="display:contents;">
            <div style="grid-column: span 7; padding: 20px;">Loading Chart...</div>
        </div>
    </div>
</div>

<div id="unlockArea">
    <button class="unlock-btn" onclick="openVipModal()">Remove Lock 🔑</button>
</div>

<button class="scroll-btn" onclick="window.scrollTo({top: 0, behavior: 'smooth'});" style="margin-bottom: 30px;">Go to Top</button>

<div id="vipModal" class="overlay">
    <div class="modal-content">
        <h2 style="color:var(--dark-blue);">VIP Plans</h2>
        <div class="plan-box" onclick="alert('WhatsApp 8103982813')">1 Day - ₹599</div>
        <div class="plan-box" onclick="alert('WhatsApp 8103982813')">7 Days - ₹1299</div>
        <div class="plan-box" onclick="alert('WhatsApp 8103982813')">30 Days - ₹1799</div>
        <button onclick="closeVipModal()" style="margin-top:10px; background:none; border:none; color:red; cursor:pointer; font-weight:bold;">CLOSE</button>
    </div>
</div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/1IReRyQjRvWWVjZTym_8DDXvx9Jttjfgy18McY53gM5w/export?format=csv";

    function openVipModal() { document.getElementById('vipModal').style.display = 'flex'; }
    function closeVipModal() { document.getElementById('vipModal').style.display = 'none'; }

    async function loadChart() {
        try {
            const res = await fetch(CSV_URL + "&cache=" + new Date().getTime());
            const data = await res.text();
            const rows = data.split('\n').map(r => r.split(','));
            let h = '';
            let lockPlaced = false;

            for(let i=1; i<rows.length; i++) {
                if(!rows[i][0] || rows[i][0].trim() === "") continue;
                h += `<div class="date-box">${rows[i][0].replace(/"/g,"")}</div>`;
                
                for(let j=1; j<=16; j+=3) {
                    let l = (rows[i][j]||"").trim().replace(/"/g,"");
                    let jo = (rows[i][j+1]||"").trim().replace(/"/g,"");
                    let r = (rows[i][j+2]||"").trim().replace(/"/g,"");

                    if(!l && !jo && !r) {
                        if(!lockPlaced) { h += `<div class="cell"><div class="single-vip-lock">🔒</div></div>`; lockPlaced=true; }
                        else { h += `<div class="cell"></div>`; }
                    } else {
                        let isRed = false;
                        if(jo.length>=2 && (jo[0]===jo[1] || Math.abs(parseInt(jo[0])-parseInt(jo[1]))===5)) isRed=true;
                        if(jo.includes('*')) isRed=true;
                        
                        let rc = isRed ? 'red-house' : '';
                        let lh = l.split('').map(s=>`<span>${s}</span>`).join('');
                        let rh = r.split('').map(s=>`<span>${s}</span>`).join('');
                        h += `<div class="cell ${rc}"><div class="panna left">${lh}</div><div class="jodi">${jo}</div><div class="panna right">${rh}</div></div>`;
                    }
                }
            }
            document.getElementById('gridData').innerHTML = h;
        } catch(e) { document.getElementById('gridData').innerHTML = "Error loading data"; }
    }
    loadChart();
</script>
</body>
</html>
