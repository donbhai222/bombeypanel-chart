<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOMBAY SPECIAL VIP</title>
    <style>
        :root { --gold: #ffcc00; --cyan: #00ffff; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 0; }
        .header { background: #111; padding: 15px; border-bottom: 2px solid var(--gold); margin-bottom: 10px; }
        
        /* Chart Design */
        .week-row { display: flex; width: 98%; margin: 8px auto; border: 1px solid #444; background: #111; min-height: 80px; }
        .date-box { width: 45px; background: var(--cyan); color: #000; font-size: 11px; font-weight: bold; display: flex; align-items: center; justify-content: center; writing-mode: vertical-lr; transform: rotate(180deg); }
        .grid { display: flex; flex: 1; background: #000; gap: 2px; padding: 2px; }
        .cell { flex: 1; border: 1px solid #333; background: #1a1a1a; display: flex; align-items: center; justify-content: space-between; padding: 2px; }
        .panna { display: flex; flex-direction: column; font-size: 9px; color: #aaa; font-weight: bold; line-height: 1.1; }
        .jodi { flex: 1; font-size: 20px; font-weight: bold; text-align: center; }
        .lock { background: #0a0a0a; color: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 22px; flex: 1; border: 1px dashed #444; }
        .red { color: #ff3333; }

        /* Form & Payment Design */
        .card { background: #111; border: 1px solid var(--gold); margin: 20px; padding: 20px; border-radius: 12px; }
        .btn { padding: 12px 25px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 5px; color: #000; text-transform: uppercase; font-size: 14px; }
        input { padding: 12px; margin: 8px; width: 85%; background: #222; color: #fff; border: 1px solid #444; border-radius: 5px; outline: none; }
        .qr-img { width: 250px; border: 3px solid #fff; margin: 15px 0; border-radius: 10px; }
        .admin-link { color: #111; font-size: 10px; cursor: pointer; padding: 30px; display: block; }
    </style>
</head>
<body>

<div class="header"><h1>BOMBAY SPECIAL VIP</h1></div>

<div id="chartArea">चार्ट लोड हो रहा है, कृपया प्रतीक्षा करें...</div>

<div class="card" id="mainAction">
    <h2 style="color:var(--gold)">🔒 VIP FULL CHART</h2>
    <p>VIP जोड़ी और पन्ना देखने के लिए अनलॉक करें</p>
    <button class="btn" onclick="openStep('formStep')">UNLOCK NOW</button>
</div>

<div class="card" id="formStep" style="display:none;">
    <input type="text" id="custName" placeholder="अपना नाम लिखें">
    <input type="number" id="custMob" placeholder="मोबाइल नंबर">
    <button class="btn" onclick="openStep('payStep')">आगे बढ़ें</button>
</div>

<div class="card" id="payStep" style="display:none;">
    <h3>स्कैन करके पेमेंट करें</h3>
    <img src="phonpe-qr.jpeg.jpeg" class="qr-img">
    <p>Omkar Yadav</p>
    <button class="btn" style="background:#25D366; color:#fff;" onclick="whatsappMe()">पेमेंट हो गया (WhatsApp)</button>
</div>

<span class="admin-link" onclick="adminGo()">Admin Login</span>

<script>
    // आपकी Google Sheet की ID
    const SHEET_ID = '1IReRyQjRvWWVjZTym_8DDXvx9Jttjfgy18McY53gM5w';
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

    async function fetchChart() {
        try {
            const response = await fetch(SHEET_URL);
            const text = await response.text();
            const data = JSON.parse(text.substr(47).slice(0, -2));
            const rows = data.table.rows;
            let finalHtml = '';

            rows.forEach((row, index) => {
                if (index === 0) return; // Heading Row skip
                if (!row.c[0]) return; // खाली लाइन skip

                let dateRange = row.c[0].v;
                finalHtml += `<div class="week-row"><div class="date-box">${dateRange}</div><div class="grid">`;
                
                let isLocked = false;
                for (let i = 1; i < 19; i += 3) {
                    let l = row.c[i] ? String(row.c[i].v) : '';
                    let j = row.c[i+1] ? String(row.c[i+1].v) : '';
                    let r = row.c[i+2] ? String(row.c[i+2].v) : '';

                    if (l && j && r) {
                        let colorClass = (i == 4 || i == 16) ? 'red' : '';
                        let p1 = l.padStart(3, '0');
                        let p2 = r.padStart(3, '0');
                        finalHtml += `
                            <div class="cell">
                                <div class="panna"><span>${p1[0]}</span><span>${p1[1]}</span><span>${p1[2]}</span></div>
                                <div class="jodi ${colorClass}">${j}</div>
                                <div class="panna"><span>${p2[0]}</span><span>${p2[1]}</span><span>${p2[2]}</span></div>
                            </div>`;
                    } else if (!isLocked) {
                        finalHtml += `<div class="lock">🔒</div>`;
                        isLocked = true;
                    } else {
                        finalHtml += `<div class="cell" style="background:#050505"></div>`;
                    }
                }
                finalHtml += `</div></div>`;
            });
            document.getElementById('chartArea').innerHTML = finalHtml;
        } catch (error) {
            document.getElementById('chartArea').innerHTML = "<p style='color:red;'>डेटा लोड नहीं हुआ। कृपया Sheet को 'Anyone with the link' पर सेट करें।</p>";
        }
    }

    // फंक्शन: स्टेप बदलना
    function openStep(id) {
        document.getElementById('mainAction').style.display = 'none';
        document.getElementById('formStep').style.display = 'none';
        document.getElementById('payStep').style.display = 'none';
        document.getElementById(id).style.display = 'block';
    }

    // फंक्शन: WhatsApp पर मैसेज भेजना
    function whatsappMe() {
        let n = document.getElementById('custName').value;
        let m = document.getElementById('custMob').value;
        if(!n || !m) { alert("नाम और नंबर भरें!"); return; }
        window.open(`https://wa.me/918103982813?text=नमस्ते, मैंने पेमेंट कर दिया है।%0Aनाम: ${n}%0Aमोबाइल: ${m}`);
    }

    // फंक्शन: एडमिन लॉगिन
    function adminGo() {
        let pin = prompt("Admin Pin डालें:");
        if(pin === "123") {
            window.open(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit`);
        } else {
            alert("गलत पिन!");
        }
    }

    // चार्ट लोड शुरू करें
    fetchChart();
</script>

</body>
</html>
