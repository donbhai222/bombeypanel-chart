<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOMBAY SPECIAL VIP CHART</title>
    <style>
        :root { --dark-blue: #1a024d; --gold: #FFD700; --vip-red: #e31e24; --grid-border: #999; }
        body { background: #FFBF82; color: var(--dark-blue); font-family: sans-serif; text-align: center; margin: 0; padding-bottom: 50px; }
        .header { background: var(--dark-blue); padding: 15px; border-bottom: 4px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .header h1 { margin: 0; font-size: 20px; color: var(--gold); text-transform: uppercase; }
        .nav-btn { background: var(--dark-blue); color: var(--gold); padding: 10px; border: 2px solid var(--gold); border-radius: 5px; cursor: pointer; margin: 15px; font-weight: bold; }
        #chartArea { background: #fff; width: 92%; margin: 10px auto; border: 2px solid #333; overflow-x: auto; border-radius: 8px; min-height: 150px; }
        table { width: 100%; border-collapse: collapse; min-width: 350px; }
        th { background: #222; color: var(--gold); font-size: 11px; padding: 10px 2px; border: 1px solid var(--grid-border); }
        td { border: 1px solid var(--grid-border); height: 55px; vertical-align: middle; position: relative; color: #000; }
        .date-box { background: #efefef; font-size: 10px; font-weight: bold; width: 45px; }
        .cell-content { display: flex; align-items: center; justify-content: center; }
        .panna { display: flex; flex-direction: column; font-size: 8px; position: absolute; font-weight: bold; width: 12px; line-height: 1; }
        .panna.left { left: 4px; } .panna.right { right: 4px; }
        .jodi { font-size: 18px; font-weight: bold; }
        .red-house .jodi, .red-house .panna { color: var(--vip-red) !important; }
        .remove-lock-btn { background: var(--vip-red); color: #fff; padding: 18px; border: 3px solid var(--gold); border-radius: 12px; font-weight: bold; width: 85%; cursor: pointer; font-size: 18px; margin: 20px 0; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; width: 90%; max-width: 400px; padding: 20px; border-radius: 15px; border: 4px solid var(--gold); overflow-y: auto; max-height: 85vh; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 2px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .verify-btn { background: #28a745; color: #fff; padding: 15px; border: none; border-radius: 8px; width: 100%; font-weight: bold; font-size: 18px; cursor: pointer; }
        #topBtn { display: none; position: fixed; bottom: 20px; right: 20px; z-index: 2000; background: var(--dark-blue); color: var(--gold); border: 2px solid var(--gold); padding: 10px 15px; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header"><h1>BOMBAY SPECIAL VIP CHART</h1></div>

<button class="nav-btn" onclick="document.getElementById('lock-section').scrollIntoView({behavior: 'smooth'});">Go to Bottom ↓</button>

<div id="chartArea">
    <table>
        <thead><tr><th>DATE</th><th>MON</th><th>TUE</th><th>WED</th><th>THU</th><th>FRI</th><th>SAT</th></tr></thead>
        <tbody id="gridData"><tr><td colspan="7" style="padding:40px;">लोड हो रहा है... अगर नहीं खुल रहा तो 'Publish to Web' चेक करें।</td></tr></tbody>
    </table>
</div>

<div id="lock-section">
    <button class="remove-lock-btn" onclick="openVipModal()">REMOVE LOCK / गेम लें 🔑</button>
</div>

<button id="topBtn" onclick="window.scrollTo({top: 0, behavior: 'smooth'});">Top ↑</button>

<!-- Modal -->
<div id="vipModal" class="overlay">
    <div class="modal-content">
        <div id="stepInfo">
            <h3>VIP Registration</h3>
            <input type="text" id="userName" placeholder="अपना नाम लिखें">
            <input type="number" id="userPhone" placeholder="मोबाइल नंबर">
            <button class="verify-btn" onclick="goToPayment()">Next / आगे बढ़ें</button>
            <p onclick="closeVipModal()" style="color:red; cursor:pointer; font-weight:bold; margin-top:15px;">Close</p>
        </div>
        <div id="stepPay" style="display:none;">
            <h3>Payment</h3>
            <p>Pay <b>₹399</b> to <b>Omkar Yadav</b></p>
            <img src="paytm-png.jpeg" style="width:160px; border:1px solid #333; margin-bottom:10px;" alt="QR">
            <input type="number" id="utrInput" placeholder="12 Digit UTR Number">
            <button class="verify-btn" onclick="startTimer()">Verify</button>
        </div>
        <div id="stepTimer" style="display:none;">
            <h3>Verifying...</h3>
            <div id="timerDisplay" style="font-size:40px; color:red; font-weight:bold;">02:00</div>
        </div>
        <div id="stepFailed" style="display:none;">
            <h2 style="color:green;">SUBMITTED</h2>
            <p>30 मिनट इंतज़ार करें।</p>
            <button class="verify-btn" onclick="location.reload()">OK</button>
        </div>
    </div>
</div>

<script>
    // अपनी शीट की आईडी यहाँ चेक करें
    const SHEET_ID = "1IReRyQjRvWWVjZTym_8DDXvx9Jttjfgy18McY53gM5w";
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

    function openVipModal() { document.getElementById('vipModal').style.display = 'flex'; }
    function closeVipModal() { document.getElementById('vipModal').style.display = 'none'; }
    
    function goToPayment() {
        if(document.getElementById('userName').value === "" || document.getElementById('userPhone').value.length < 10) {
            alert("सही जानकारी भरें"); return;
        }
        document.getElementById('stepInfo').style.display = 'none';
        document.getElementById('stepPay').style.display = 'block';
    }

    function startTimer() {
        if(document.getElementById('utrInput').value.length < 10) { alert("UTR डालें"); return; }
        document.getElementById('stepPay').style.display = 'none';
        document.getElementById('stepTimer').style.display = 'block';
        let t = 120;
        const x = setInterval(() => {
            let m = Math.floor(t/60), s = t%60;
            document.getElementById('timerDisplay').innerText = `0${m}:${s<10?'0'+s:s}`;
            if (t-- <= 0) { clearInterval(x); showFinal(); }
        }, 1000);
    }

    function showFinal() {
        document.getElementById('stepTimer').style.display = 'none';
        document.getElementById('stepFailed').style.display = 'block';
    }

    async function loadChart() {
        try {
            const res = await fetch(CSV_URL + "&cache=" + new Date().getTime());
            const data = await res.text();
            const rows = data.split(/\r?\n/).map(r => r.split(','));
            let html = '', lockPlaced = false;
            for(let i = 1; i < rows.length; i++) {
                let dt = (rows[i][0] || "").trim(); if(!dt) continue;
                html += `<tr><td class="date-box">${dt}</td>`;
                for(let j = 1; j <= 16; j += 3) {
                    let lp = (rows[i][j] || "").trim(), jd = (rows[i][j+1] || "").trim(), rp = (rows[i][j+2] || "").trim();
                    if(!lp && !jd && !rp) {
                        if(!lockPlaced) { html += `<td onclick="openVipModal()" style="cursor:pointer; color:red; font-size:20px;">🔒</td>`; lockPlaced = true; }
                        else html += `<td></td>`;
                    } else {
                        let isRed = (jd.length === 2 && (jd[0] === jd[1] || Math.abs(jd[0] - jd[1]) === 5));
                        html += `<td class="${isRed ? 'red-house' : ''}"><div class="cell-content">
                            <div class="panna left">${lp.split('').map(s=>`<span>${s}</span>`).join('')}</div>
                            <div class="jodi">${jd}</div>
                            <div class="panna right">${rp.split('').map(s=>`<span>${s}</span>`).join('')}</div>
                        </div></td>`;
                    }
                }
                html += `</tr>`;
            }
            document.getElementById('gridData').innerHTML = html;
        } catch(e) { console.log(e); }
    }
    window.onload = loadChart;
    window.onscroll = function() { document.getElementById("topBtn").style.display = (window.pageYOffset > 300) ? "block" : "none"; };
</script>
</body>
</html>
