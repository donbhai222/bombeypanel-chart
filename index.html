<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOMBAY SPECIAL VIP CHART</title>
    <style>
        :root { --dark-blue: #1a024d; --gold: #FFD700; --vip-red: #e31e24; --grid-border: #666; }
        body { background: #FFBF82; color: var(--dark-blue); font-family: 'Arial', sans-serif; text-align: center; margin: 0; padding-bottom: 100px; }
        
        .header { background: var(--dark-blue); padding: 15px; border-bottom: 4px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .header h1 { margin: 0; font-size: 20px; color: var(--gold); text-transform: uppercase; }

        .desc-section { background: #fff; width: 92%; margin: 10px auto; padding: 10px; border-radius: 5px; border-left: 5px solid var(--vip-red); text-align: left; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .desc-section p { margin: 0; font-size: 13px; font-weight: bold; color: #333; }

        /* Chart Area - Strict Grid */
        #chartArea { background: #fff; width: 98%; margin: 10px auto; border: 2px solid #000; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { border-collapse: collapse; margin: 0 auto; table-layout: fixed; width: auto; }
        
        th { background: #333; color: var(--gold); font-size: 11px; padding: 8px 0; border: 1px solid var(--grid-border); text-transform: uppercase; }
        
        /* THE SQUARE BOX LOGIC - Strict Fix */
        td { 
            border: 1px solid var(--grid-border); 
            width: 60px !important;  /* Fixed Width */
            min-width: 60px !important; 
            max-width: 60px !important;
            height: 60px !important; /* Fixed Height */
            min-height: 60px !important;
            background: #fff; 
            padding: 0;
            vertical-align: middle;
            text-align: center;
        }
        
        /* Date Column Styling */
        .date-box { background: #eee !important; font-size: 10px; font-weight: bold; color: #000; width: 55px !important; min-width: 55px !important; }
        
        /* Panna-Jodi Content */
        .cell-content { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
        .panna-vertical { display: flex; flex-direction: column; font-size: 9px; font-weight: bold; line-height: 1; width: 12px; color: #444; }
        .jodi { font-size: 22px; font-weight: bold; color: #000; margin: 0 2px; }
        
        .red-house .jodi, .red-house .panna-vertical { color: var(--vip-red) !important; }
        .lock-btn { color: var(--vip-red); font-size: 24px; cursor: pointer; }

        /* Floating Buttons */
        .float-btn { position: fixed; right: 10px; background: var(--vip-red); color: white; border: 2px solid #fff; border-radius: 50px; font-weight: bold; z-index: 9999; cursor: pointer; font-size: 11px; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 8px rgba(0,0,0,0.4); }
        .go-top { bottom: 80px; } 
        .go-bottom { bottom: 20px; }

        .btn-pay-main { background: var(--vip-red); color: white; padding: 15px; border: none; border-radius: 8px; width: 90%; font-weight: bold; font-size: 18px; margin: 20px 0; cursor: pointer; }

        /* Modal Settings */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; width: 90%; max-width: 380px; padding: 20px; border-radius: 10px; border: 4px solid var(--gold); }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .option-box { border: 2px solid #ddd; padding: 12px; margin: 10px 0; border-radius: 8px; text-align: left; }
        .option-box.active { border: 2px solid var(--vip-red); background: #fff0f0; }
    </style>
</head>
<body>

<div class="header"><h1>BOMBAY SPECIAL VIP CHART</h1></div>

<div class="desc-section">
    <p>🎯 <span>VIP सेवा:</span> सबसे तेज़ और सटीक फिक्स गेम यहाँ देखें।</p>
</div>

<div class="float-btn go-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'});">TOP ↑</div>

<div id="chartArea">
    <table>
        <thead>
            <tr>
                <th style="width:55px;">DATE</th>
                <th>MON</th><th>TUE</th><th>WED</th><th>THU</th><th>FRI</th><th>SAT</th>
            </tr>
        </thead>
        <tbody id="gridData"></tbody>
    </table>
</div>

<button class="btn-pay-main" onclick="openVipModal()">JOIN VIP / लॉक खोलें 🔑</button>

<div class="float-btn go-bottom" onclick="window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});">Down ↓</div>

<!-- VIP MODAL -->
<div id="vipModal" class="overlay">
    <div class="modal-content">
        <div id="step1">
            <h3 style="margin-top:0;">VIP Registration</h3>
            <input type="text" id="vName" placeholder="आपका नाम">
            <input type="number" id="vPhone" placeholder="मोबाइल नंबर">
            <button class="btn-pay-main" style="width:100%;" onclick="goNext()">Next / आगे बढ़ें</button>
            <p onclick="closeVipModal()" style="color:red; cursor:pointer; font-weight:bold;">Close</p>
        </div>
        <div id="step2" style="display:none;">
            <h3>Select Plan</h3>
            <div class="option-box active" onclick="setPlan(this, 999)"><b>1 Day Plan</b><br><span>Charge: ₹999</span></div>
            <div class="option-box" onclick="setPlan(this, 1999)"><b>7 Days Plan</b><br><span>Charge: ₹1999</span></div>
            <p>Pay To: <b>OMKAR YADAV</b> | Amt: <b id="amtVal" style="color:red;">₹999</b></p>
            <img src="paytm-png.jpeg" style="width:140px; border:1px solid #000;">
            <input type="number" id="utrVal" placeholder="Enter 12 Digit UTR">
            <button class="btn-pay-main" style="width:100%;" onclick="verify()">Verify Payment</button>
        </div>
        <div id="step3" style="display:none;">
            <h3>Verifying...</h3>
            <div id="timerBox" style="font-size:40px; color:red; font-weight:bold;">02:00</div>
        </div>
        <div id="step4" style="display:none;">
            <h2 style="color:green;">SUBMITTED ✅</h2>
            <button class="btn-pay-main" style="width:100%;" onclick="closeVipModal()">DONE</button>
        </div>
    </div>
</div>

<script>
    const CSV = "https://docs.google.com/spreadsheets/d/1IReRyQjRvWWVjZTym_8DDXvx9Jttjfgy18McY53gM5w/export?format=csv&gid=0";

    function openVipModal() { document.getElementById('vipModal').style.display='flex'; resetModal(); }
    function closeVipModal() { document.getElementById('vipModal').style.display='none'; }
    function resetModal() {
        document.getElementById('step1').style.display='block';
        ['step2','step3','step4'].forEach(id => document.getElementById(id).style.display='none');
    }

    function goNext() {
        if(document.getElementById('vName').value == "" || document.getElementById('vPhone').value.length < 10) { alert("Details fill karein"); return; }
        document.getElementById('step1').style.display='none';
        document.getElementById('step2').style.display='block';
    }

    function setPlan(el, a) {
        document.querySelectorAll('.option-box').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('amtVal').innerText = "₹" + a;
    }

    function verify() {
        if(document.getElementById('utrVal').value.length < 10) { alert("Invalid UTR"); return; }
        document.getElementById('step2').style.display='none';
        document.getElementById('step3').style.display='block';
        let t = 120;
        let x = setInterval(() => {
            let m=Math.floor(t/60), s=t%60;
            document.getElementById('timerBox').innerText = `0${m}:${s<10?'0'+s:s}`;
            if(t-- <= 0) { clearInterval(x); document.getElementById('step3').style.display='none'; document.getElementById('step4').style.display='block'; }
        }, 1000);
    }

    async function loadChart() {
        try {
            const res = await fetch(CSV + "&cache=" + Date.now());
            const data = await res.text();
            const rows = data.split('\n').filter(r => r.trim() !== '').map(r => r.split(','));
            let html = '', lockShown = false;

            for(let i=1; i<rows.length; i++) {
                let d = (rows[i][0] || "").trim(); if(!d) continue;
                html += `<tr><td class="date-box">${d}</td>`;
                for(let j=1; j<=16; j+=3) {
                    let lp=(rows[i][j]||"").trim(), jd=(rows[i][j+1]||"").trim(), rp=(rows[i][j+2]||"").trim();
                    if(!jd && !lp) {
                        if(!lockShown) { html += `<td onclick="openVipModal()"><span class="lock-btn">🔒</span></td>`; lockShown = true; }
                        else html += `<td></td>`;
                    } else {
                        let isRed = (jd.length==2 && (jd[0]==jd[1] || Math.abs(jd[0]-jd[1])==5));
                        html += `<td class="${isRed?'red-house':''}">
                            <div class="cell-content">
                                <div class="panna-vertical">${lp.split('').map(n=>`<span>${n}</span>`).join('')}</div>
                                <div class="jodi">${jd}</div>
                                <div class="panna-vertical">${rp.split('').map(n=>`<span>${n}</span>`).join('')}</div>
                            </div>
                        </td>`;
                    }
                }
                html += `</tr>`;
            }
            document.getElementById('gridData').innerHTML = html;
        } catch(e) { console.log(e); }
    }
    window.onload = loadChart;
</script>
</body>
</html>
