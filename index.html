<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOMBAY SPECIAL VIP</title>
    <style>
        :root { --gold: #ffcc00; --bg: #000; --grid-border: #999; }
        body { background: var(--bg); color: #fff; font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 0; scroll-behavior: smooth; }
        
        .header { background: #111; color: var(--gold); padding: 15px; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        
        #chartArea { background: #fff; width: 94%; margin: 10px auto; border: 1px solid var(--grid-border); border-radius: 4px; overflow: hidden; }
        .chart-grid { display: grid; grid-template-columns: 45px repeat(6, 1fr); width: 100%; }
        
        .day-label, .date-label { background: #000; color: var(--gold); font-weight: bold; font-size: 9px; padding: 8px 0; border: 0.5px solid var(--grid-border); }
        .date-box { background: #f0f0f0; color: #000; font-size: 8.5px; border: 0.5px solid var(--grid-border); display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        .cell { position: relative; aspect-ratio: 1 / 1.1; background: #fff; border: 0.5px solid var(--grid-border); display: flex; align-items: center; justify-content: center; }
        
        .panna { display: flex; flex-direction: column; font-size: 7.5px; color: #666; position: absolute; line-height: 1; font-weight: bold; }
        .panna.left { left: 1.5px; }
        .panna.right { right: 1.5px; }
        .jodi { font-size: 17px; font-weight: bold; color: #000; z-index: 1; }

        .red-house .jodi, .red-house .panna { color: #e31e24 !important; }

        /* सिर्फ एक सिंगल लॉक के लिए स्टाइल */
        .single-vip-lock { color: var(--gold); font-size: 22px; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        .unlock-btn { background: var(--gold); color: #000; padding: 15px; border: none; width: 90%; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 18px; margin: 20px 0; }

        /* MODAL CSS */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #111; border: 2px solid var(--gold); width: 90%; max-width: 400px; padding: 20px; border-radius: 12px; }
        .plan-box { border: 1px solid var(--gold); margin: 12px 0; padding: 15px; border-radius: 8px; cursor: pointer; }
        .qr-box { margin-top: 20px; border: 1px dashed var(--gold); padding: 15px; display: none; background: #fff; color: #000; border-radius: 8px; }
        .btn-wa { background: #25D366; color: #fff; border: none; padding: 15px; width: 100%; font-weight: bold; border-radius: 8px; margin-top: 15px; display: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="header"><h1>BOMBAY SPECIAL VIP</h1></div>

<div id="chartArea">
    <div class="chart-grid">
        <div class="date-label">DATE</div>
        <div class="day-label">MON</div><div class="day-label">TUE</div><div class="day-label">WED</div>
        <div class="day-label">THU</div><div class="day-label">FRI</div><div class="day-label">SAT</div>
        <div id="gridData" style="display:contents;">लोड हो रहा है...</div>
    </div>
</div>

<button class="unlock-btn" onclick="openVipModal()">🔒 UNLOCK VIP CHART</button>

<div id="vipModal" class="overlay">
    <div class="modal-content">
        <div id="modalStep1">
            <h2 style="color:var(--gold);">VIP प्लान चुनें</h2>
            <div class="plan-box" onclick="goToStep2('7 दिन के लिए 1299')">7 दिन के लिए - ₹1299</div>
            <div class="plan-box" onclick="goToStep2('30 दिन के लिए 1799')">30 दिन के लिए - ₹1799</div>
            <button onclick="closeVipModal()" style="color:#ccc; background:none; border:none; margin-top:10px;">बंद करें</button>
        </div>
        <div id="modalStep2" style="display:none;">
            <input type="text" id="userName" placeholder="अपना नाम" style="width:80%; padding:10px; margin:5px;"><br>
            <input type="number" id="userNum" placeholder="WhatsApp नंबर" style="width:80%; padding:10px; margin:5px;"><br>
            <button class="unlock-btn" style="width:85%; font-size:14px;" onclick="showQR()">पेमेंट QR दिखाएं</button>
            <div id="qrBox" class="qr-box">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=upi://pay?pa=omkaryadavsonu8888-1@oksbi%26pn=Omkar%20Yadav%26cu=INR" style="width:150px;">
                <p><b>Omkar Yadav</b></p>
            </div>
            <button class="btn-wa" id="finalWaBtn" onclick="sendToWhatsApp()">पेमेंट कर दिया (WhatsApp)</button>
        </div>
    </div>
</div>

<script>
    let selectedPlanText = "";
    function openVipModal() { document.getElementById('vipModal').style.display = 'flex'; }
    function closeVipModal() { document.getElementById('vipModal').style.display = 'none'; }
    function goToStep2(p) { selectedPlanText = p; document.getElementById('modalStep1').style.display = 'none'; document.getElementById('modalStep2').style.display = 'block'; }
    function showQR() { document.getElementById('qrBox').style.display = 'block'; document.getElementById('finalWaBtn').style.display = 'block'; }
    function sendToWhatsApp() {
        let name = document.getElementById('userName').value;
        let url = `https://api.whatsapp.com/send?phone=918103982813&text=Name: ${name}, Plan: ${selectedPlanText}. Payment Done.`;
        window.open(url, '_blank');
    }

    const CSV_URL = `https://docs.google.com/spreadsheets/d/1IReRyQjRvWWVjZTym_8DDXvx9Jttjfgy18McY53gM5w/export?format=csv&cache=${new Date().getTime()}`;

    async function loadChart() {
        try {
            const res = await fetch(CSV_URL);
            const data = await res.text();
            const rows = data.split('\n').map(r => r.split(','));
            let h = '';
            let lockPlaced = false; // यह ट्रैक करने के लिए कि क्या हमने आज का ताला लगा दिया है

            for(let i=1; i<rows.length; i++) {
                if(!rows[i][0]) continue;
                h += `<div class="date-box">${rows[i][0].replace(/"/g,"")}</div>`;
                
                for(let j=1; j<=16; j+=3) {
                    let l=(rows[i][j]||'').trim().replace(/"/g,""), 
                        jo=(rows[i][j+1]||'').trim().replace(/"/g,""), 
                        r=(rows[i][j+2]||'').trim().replace(/"/g,"");

                    if (l === "" && jo === "" && r === "") {
                        // अगर यह पहला खाली सेल है, तो यहाँ ताला लगाओ
                        if (!lockPlaced) {
                            h += `<div class="cell"><div class="single-vip-lock">🔒</div></div>`;
                            lockPlaced = true; // अब आगे किसी खाली सेल में ताला नहीं लगेगा
                        } else {
                            // बाकी खाली सेल सादे रहेंगे
                            h += `<div class="cell"></div>`;
                        }
                    } else {
                        // अगर डेटा है तो नंबर दिखाओ
                        let d1 = parseInt(jo[0]), d2 = parseInt(jo[1]);
                        let redClass = (d1===d2 || Math.abs(d1-d2)===5) ? 'red-house' : '';
                        let lh = l.split('').map(s=>`<span>${s}</span>`).join('');
                        let rh = r.split('').map(s=>`<span>${s}</span>`).join('');
                        h += `<div class="cell ${redClass}"><div class="panna left">${lh}</div><div class="jodi">${jo}</div><div class="panna right">${rh}</div></div>`;
                    }
                }
            }
            document.getElementById('gridData').innerHTML = h;
        } catch(e) { console.error(e); }
    }
    loadChart();
</script>
</body>
</html>
