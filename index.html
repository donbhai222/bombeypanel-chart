<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOMBAY SPECIAL VIP CHART</title>
    
    <style>
        :root { 
            --gold-bg: #FFBF82; 
            --yellow-accent: #F9E79F;
            --dark-blue: #260470;
            --grid-border: #999; 
            --red: #e31e24;
        }
        body { background: var(--gold-bg); font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 0; }
        
        .header { background: var(--gold-bg); padding: 10px; border-bottom: 3px solid #fff; position: sticky; top: 0; z-index: 1000; }
        .header h1 { margin: 0; font-size: 18px; color: var(--red); font-weight: 900; }
        
        /* Chart Container */
        #chartArea { 
            background: #fff; 
            width: 95%; 
            margin: 10px auto; 
            border: 1px solid var(--grid-border); 
            overflow-x: auto; /* मोबाइल पर स्क्रॉल के लिए */
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        table { width: 100%; border-collapse: collapse; table-layout: auto; }
        th { background: #000; color: #fff; font-size: 10px; padding: 5px; border: 1px solid var(--grid-border); }
        
        td { border: 1px solid var(--grid-border); height: 50px; position: relative; vertical-align: middle; padding: 2px; }
        
        .date-box { background: #eee; font-size: 10px; font-weight: bold; width: 35px; text-align: center; }
        
        /* Panna and Jodi Styling */
        .cell-content { position: relative; display: flex; align-items: center; justify-content: center; min-width: 45px; height: 100%; }
        
        .panna { 
            display: flex; 
            flex-direction: column; 
            font-size: 8px; /* पन्ना छोटा किया */
            font-weight: bold; 
            line-height: 1; 
            color: #444; 
            width: 10px;
            text-align: center;
        }
        .panna.left { position: absolute; left: 2px; } 
        .panna.right { position: absolute; right: 2px; }
        
        .jodi { font-size: 18px; font-weight: bold; color: #000; }
        
        .red-house .jodi, .red-house .panna { color: var(--red) !important; }
        
        /* Lock Icon */
        .single-vip-lock { color: #f70031; font-size: 18px; cursor: pointer; }

        /* Payment Modal */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; width: 90%; max-width: 350px; padding: 20px; border-radius: 15px; text-align: center; box-sizing: border-box; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { background: #28a745; color: #fff; padding: 12px; border: none; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<div class="header"><h1>BOMBAY SPECIAL VIP CHART</h1></div>

<div id="chartArea">
    <table>
        <thead>
            <tr>
                <th>DATE</th>
                <th>MON</th><th>TUE</th><th>WED</th><th>THU</th><th>FRI</th><th>SAT</th>
            </tr>
        </thead>
        <tbody id="gridData">
            <!-- डेटा यहाँ लोड होगा -->
        </tbody>
    </table>
</div>

<div id="vipModal" class="overlay">
    <div class="modal-content">
        <h3>Unlock VIP Chart</h3>
        <input type="text" id="userName" placeholder="Your Name">
        <input type="number" id="userPhone" placeholder="Mobile Number">
        <button class="btn" onclick="alert('Proceeding to payment...')">NEXT</button>
        <p onclick="document.getElementById('vipModal').style.display='none'" style="color:red; cursor:pointer; margin-top:10px;">Close</p>
    </div>
</div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/1IReRyQjRvWWVjZTym_8DDXvx9Jttjfgy18McY53gM5w/export?format=csv";

    async function loadChart() {
        const gridBody = document.getElementById('gridData');
        try {
            const res = await fetch(CSV_URL + "&t=" + new Date().getTime());
            const data = await res.text();
            const rows = data.split(/\r?\n/).map(r => r.split(','));
            let html = '';
            let lockPlaced = false;

            for(let i = 1; i < rows.length; i++) {
                let dt = (rows[i][0] || "").trim();
                if(!dt) continue;
                html += `<tr><td class="date-box">${dt}</td>`;
                
                for(let j = 1; j <= 16; j += 3) {
                    let lp = (rows[i][j] || "").trim();
                    let jd = (rows[i][j+1] || "").trim();
                    let rp = (rows[i][j+2] || "").trim();
                    
                    if(!lp && !jd && !rp) {
                        if(!lockPlaced) {
                            html += `<td onclick="document.getElementById('vipModal').style.display='flex'"><span class="single-vip-lock">🔒</span></td>`;
                            lockPlaced = true;
                        } else { html += `<td></td>`; }
                    } else {
                        let isRed = false;
                        if(jd.length === 2 && (jd[0] === jd[1] || Math.abs(jd[0] - jd[1]) === 5)) isRed = true;
                        
                        let lpS = lp.split('').map(s => `<span>${s}</span>`).join('');
                        let rpS = rp.split('').map(s => `<span>${s}</span>`).join('');
                        
                        html += `<td class="${isRed ? 'red-house' : ''}">
                                    <div class="cell-content">
                                        <div class="panna left">${lpS}</div>
                                        <div class="jodi">${jd}</div>
                                        <div class="panna right">${rpS}</div>
                                    </div>
                                 </td>`;
                    }
                }
                html += `</tr>`;
            }
            gridBody.innerHTML = html;
        } catch(e) { gridBody.innerHTML = '<tr><td colspan="7">Error loading data.</td></tr>'; }
    }
    window.onload = loadChart;
</script>

</body>
</html>
